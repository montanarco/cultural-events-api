spring.application.name=java-learning-epam
spring.datasource.url=jdbc:h2:mem:cultural_events_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JWT — override JWT_SECRET env var in production, never commit a real secret
app.security.jwt.secret=${JWT_SECRET:amF2YUxlYXJuaW5nUHJvamVjdFNlY3VyaXR5U2VjcmV0MTIz}
app.security.jwt.expiration=3600000

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Let Flyway own the schema Hibernate must not recreate or wipe tables
spring.jpa.hibernate.ddl-auto=none

#Spring actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env
management.info.env.enabled=true

# Application info (exposed at /actuator/info)
info.app.name=java-learning-epam
info.app.description=Cultural Events API - Spring Boot Learning Project
info.app.version=0.0.1-SNAPSHOT
info.app.java.version=21